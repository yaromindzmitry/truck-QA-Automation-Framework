[pytest]
addopts =
    --self-contained-html
    --reruns=2
    --reruns-delay=1
    -v

testpaths = tests api/tests
markers =
    smoke: Critical smoke tests
    header: Header component tests
    home: Home page section tests
    catalog: Catalog section tests
    listing: Ad listing page tests
    leasing: Leasing listing page tests
    seller: Seller page tests
    gdpr: GDPR popup tests
    footer: Footer tests
    locale: Multi-locale tests
    tier1: Tier 1 locale smoke (EN/DE/PL)
    tier2: Tier 2 locale smoke (secondary markets)
    locale_cross: Cross-locale consistency tests
    ui_security: UI security tests
    slow: Slow tests (photo sliders, etc.)
    api: All API/HTTP tests
    api_status: HTTP status & headers checks
    api_catalog: Catalog API tests
    api_listings: Listing page API tests
    api_seller: Seller page API tests
    security: Security / injection tests

filterwarnings =
    ignore::DeprecationWarning
